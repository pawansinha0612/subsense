<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubSense</title>
    <style>
        :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --text:#e6e8ec; --muted:#9aa0aa; --accent:#5b8cff; }
        * { box-sizing:border-box; }
        body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
        .wrap { max-width:880px; margin:0 auto; padding:32px 20px; }
        h1 { font-size:24px; margin:0 0 4px; }
        .sub { color:var(--muted); margin:0 0 24px; font-size:14px; }
        .cards { display:flex; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
        .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; flex:1; min-width:160px; }
        .card .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
        .card .val { font-size:28px; font-weight:600; margin-top:6px; }
        form { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:28px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
        label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
        input, select { width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--text); font-size:14px; }
        .full { grid-column:1/-1; }
        button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:10px 16px; font-size:14px; cursor:pointer; }
        button.del { background:transparent; color:#ff6b6b; border:1px solid var(--line); padding:4px 10px; font-size:12px; }
        table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
        th, td { text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:14px; }
        th { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
        tr:last-child td { border-bottom:0; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>SubSense</h1>
    <p class="sub">Track what your subscriptions really cost you.</p>

    <div class="cards">
        <div class="card"><div class="label">Active subs</div><div class="val" id="count">–</div></div>
        <div class="card"><div class="label">Monthly spend</div><div class="val" id="monthly">–</div></div>
        <div class="card"><div class="label">Annual spend</div><div class="val" id="annual">–</div></div>
    </div>

    <form id="add">
        <div><label>Name </label><input name="name" required></div>
        <div><label>Amount</label><input name="amount" type="number" step="0.01" required></div>
        <div><label>Currency</label><input name="currency" value="AUD"></div>
        <div><label>Cycle</label><select name="cycle"><option>MONTHLY</option><option>YEARLY</option></select></div>
        <div><label>Category</label><input name="category"></div>
        <div><label>Next renewal</label><input name="nextRenewal" type="date"></div>
        <div class="full"><button type="submit">Add subscription</button></div>
    </form>

    <table>
        <thead><tr><th>Name</th><th>Amount</th><th>Cycle</th><th>Category</th><th>Renews</th><th></th></tr></thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
    const api = "/api/subscriptions";
    async function load() {
        const [subs, sum] = await Promise.all([
            fetch(api).then(r => r.json()),
            fetch(api + "/summary").then(r => r.json())
        ]);
        document.getElementById("count").textContent = sum.activeCount;
        document.getElementById("monthly").textContent = "$" + Number(sum.monthlySpend).toFixed(2);
        document.getElementById("annual").textContent = "$" + Number(sum.annualSpend).toFixed(2);
        document.getElementById("rows").innerHTML = subs.map(s => `
    <tr>
      <td>${s.name}</td>
      <td>${s.currency} ${Number(s.amount).toFixed(2)}</td>
      <td>${s.cycle}</td>
      <td>${s.category || ""}</td>
      <td>${s.nextRenewal || ""}</td>
      <td><button class="del" onclick="del(${s.id})">Delete</button></td>
    </tr>`).join("");
    }
    async function del(id) { await fetch(api + "/" + id, { method: "DELETE" }); load(); }
    document.getElementById("add").addEventListener("submit", async e => {
        e.preventDefault();
        const f = e.target, body = {};
        new FormData(f).forEach((v, k) => body[k] = v);
        await fetch(api, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
        f.reset(); load();
    });
    load();
</script>
</body>
</html>
