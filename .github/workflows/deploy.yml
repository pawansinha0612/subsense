name: deploy
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: subsense
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Build
        run: mvn -q package -DskipTests
      - name: Boot against throwaway Postgres
        run: |
          nohup java -jar target/subsense-0.0.1.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/subsense?sslmode=disable \
            --spring.datasource.username=app \
            --spring.datasource.password=test > app.log 2>&1 &
          for i in $(seq 1 30); do curl -sf localhost:8080/actuator/health && break; sleep 2; done
      - name: Smoke test (gate)
        run: |
          set -e
          curl -sf localhost:8080/actuator/health | grep -q '"status":"UP"'
          curl -sf -XPOST localhost:8080/api/subscriptions -H 'content-type: application/json' \
            -d '{"name":"CI","amount":1,"currency":"AUD","cycle":"MONTHLY","category":"CI","nextRenewal":"2026-12-01"}' > /dev/null
          curl -sf localhost:8080/api/subscriptions > /dev/null
          curl -sf localhost:8080/api/subscriptions/summary > /dev/null
          echo "smoke passed"

  deploy:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::801702848188:role/github-actions-deploy
          aws-region: ap-southeast-2
      - name: Deploy to app-server via SSM
        run: |
          cat > params.json <<'EOF'
          {"commands":["su - ec2-user -c 'cd ~/subsense && git pull && /opt/maven/bin/mvn -q package -DskipTests'","systemctl restart subsense"]}
          EOF
          ID=$(aws ssm send-command --instance-ids i-010edc7a87864b096 --document-name AWS-RunShellScript --parameters file://params.json --region ap-southeast-2 --query Command.CommandId --output text)
          echo "deploy command: $ID"
          aws ssm wait command-executed --command-id "$ID" --instance-id i-010edc7a87864b096 --region ap-southeast-2 || true
          aws ssm get-command-invocation --command-id "$ID" --instance-id i-010edc7a87864b096 --region ap-southeast-2

  load:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::801702848188:role/github-actions-deploy
          aws-region: ap-southeast-2
      - name: Full load from the load-generator via SSM
        run: |
          cat > lparams.json <<'EOF'
          {"commands":["cd /root && k6 run load.js"]}
          EOF
          ID=$(aws ssm send-command --instance-ids i-0c469b7c65bb80ff6 --document-name AWS-RunShellScript --parameters file://lparams.json --region ap-southeast-2 --query Command.CommandId --output text)
          echo "load command: $ID"
          aws ssm wait command-executed --command-id "$ID" --instance-id i-0c469b7c65bb80ff6 --region ap-southeast-2 || true
          aws ssm get-command-invocation --command-id "$ID" --instance-id i-0c469b7c65bb80ff6 --region ap-southeast-2