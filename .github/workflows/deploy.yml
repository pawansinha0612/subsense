name: deploy
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::801702848188:role/github-actions-deploy
          aws-region: ap-southeast-2
      - name: Deploy to EC2 via SSM
        run: |
          cat > params.json <<'EOF'
          {"commands":["su - ec2-user -c 'cd ~/subsense && git pull && /opt/maven/bin/mvn -q package -DskipTests'","systemctl restart subsense"]}
          EOF
          ID=$(aws ssm send-command \
            --instance-ids i-010edc7a87864b096 \
            --document-name AWS-RunShellScript \
            --parameters file://params.json \
            --region ap-southeast-2 \
            --query Command.CommandId --output text)
          echo "SSM command: $ID"
          aws ssm wait command-executed --command-id "$ID" --instance-id i-010edc7a87864b096 --region ap-southeast-2 || true
          aws ssm get-command-invocation --command-id "$ID" --instance-id i-010edc7a87864b096 --region ap-southeast-2